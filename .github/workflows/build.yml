name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install requests pymysql psycopg2-binary openpyxl

      - name: Build EXE
        run: |
          pyinstaller --onefile --name PIIScanner --console main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: PIIScanner-Windows
          path: dist/PIIScanner.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/PIIScanner.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
