name: Build Windows EXE + Linux Binary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tesseract OCR
        run: |
          choco install tesseract --yes
          echo "C:\Program Files\Tesseract-OCR" >> $env:GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psycopg2-binary oracledb mysql-connector-python pymongo pdfplumber pytesseract Pillow requests cryptography

      - name: Build EXE
        run: |
          python -m PyInstaller `
            --onefile `
            --name KnightGuard-PII-Scanner `
            --clean `
            --noconfirm `
            --hidden-import psycopg2 `
            --hidden-import oracledb `
            --hidden-import mysql.connector `
            --hidden-import pymongo `
            --hidden-import pytesseract `
            --hidden-import pdfplumber `
            --hidden-import PIL `
            --hidden-import cryptography `
            --collect-all cryptography `
            main.py

      - name: Verify EXE
        run: dist\KnightGuard-PII-Scanner.exe status

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnightGuard-PII-Scanner-Windows
          path: dist\KnightGuard-PII-Scanner.exe
          retention-days: 90

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psycopg2-binary oracledb mysql-connector-python pymongo pdfplumber pytesseract Pillow requests cryptography

      - name: Build Linux binary
        run: |
          python -m PyInstaller \
            --onefile \
            --name KnightGuard-PII-Scanner-Linux \
            --clean \
            --noconfirm \
            --hidden-import psycopg2 \
            --hidden-import oracledb \
            --hidden-import mysql.connector \
            --hidden-import pymongo \
            --hidden-import pytesseract \
            --hidden-import pdfplumber \
            --hidden-import PIL \
            --hidden-import cryptography \
            --collect-all cryptography \
            main.py

      - name: Verify binary
        run: dist/KnightGuard-PII-Scanner-Linux status

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnightGuard-PII-Scanner-Linux
          path: dist/KnightGuard-PII-Scanner-Linux
          retention-days: 90

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: KnightGuard-PII-Scanner-Windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: KnightGuard-PII-Scanner-Linux

      - name: Make Linux binary executable
        run: chmod +x KnightGuard-PII-Scanner-Linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "KnightGuard PII Scanner v2.0.${{ github.run_number }}"
          body: |
            ## KnightGuard GRC PII Scanner Agent v2.0
            **ByteKnight Security Pvt. Ltd.** | knightguardgrc.com

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `KnightGuard-PII-Scanner.exe` |
            | Linux    | `KnightGuard-PII-Scanner-Linux` |

            ### Features
            - ✅ All major databases: PostgreSQL, MySQL, Oracle, MSSQL, MongoDB, SQLite
            - ✅ Full offline mode — scan without internet, upload later
            - ✅ Network database discovery + endpoint/laptop/desktop scanning
            - ✅ Image OCR — scan Aadhaar cards, PAN cards in images
            - ✅ Agent activation/deactivation by super admin
            - ✅ Full raw PII data sent (not just categories)
            - ✅ Upload offline scan results anytime
            - ✅ Heartbeat on status — dashboard shows Online instantly

            ### Windows Quick Start
            ```
            KnightGuard-PII-Scanner.exe configure --server https://api.knightguardgrc.com --api-key YOUR_KEY
            KnightGuard-PII-Scanner.exe status
            KnightGuard-PII-Scanner.exe discover
            KnightGuard-PII-Scanner.exe scan-db --db "postgresql://user:pass@host/db"
            KnightGuard-PII-Scanner.exe scan-db --db "oracle://user:pass@host:1521/ORCL"
            KnightGuard-PII-Scanner.exe scan-files --path "C:\Users\Documents"
            KnightGuard-PII-Scanner.exe scan-db --db "postgresql://..." --offline
            KnightGuard-PII-Scanner.exe upload --file pii_scan_results.json
            ```

            ### Linux Quick Start
            ```bash
            chmod +x KnightGuard-PII-Scanner-Linux
            ./KnightGuard-PII-Scanner-Linux configure --server https://api.knightguardgrc.com --api-key YOUR_KEY
            ./KnightGuard-PII-Scanner-Linux status
            ./KnightGuard-PII-Scanner-Linux discover
            ./KnightGuard-PII-Scanner-Linux scan-db --db "postgresql://user:pass@host/db"
            ./KnightGuard-PII-Scanner-Linux scan-files --path /home
            ./KnightGuard-PII-Scanner-Linux scan-db --db "postgresql://..." --offline
            ./KnightGuard-PII-Scanner-Linux upload --file pii_scan_results.json
            ```
          files: |
            KnightGuard-PII-Scanner.exe
            KnightGuard-PII-Scanner-Linux
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
