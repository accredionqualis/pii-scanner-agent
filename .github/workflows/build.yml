name: Build Windows EXE + Linux Binary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psycopg2-binary oracledb mysql-connector-python pymongo pdfplumber pytesseract Pillow requests cryptography

      - name: Build EXE
        run: |
          python -m PyInstaller `
            --onefile `
            --name KnightGuard-PII-Scanner `
            --clean `
            --noconfirm `
            --hidden-import psycopg2 `
            --hidden-import oracledb `
            --hidden-import oracledb.thin_impl `
            --hidden-import mysql.connector `
            --hidden-import pymongo `
            --hidden-import pdfplumber `
            --hidden-import PIL `
            --hidden-import cryptography `
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 `
            --hidden-import cryptography.hazmat.primitives.kdf.scrypt `
            --hidden-import cryptography.hazmat.primitives.kdf.hkdf `
            --hidden-import cryptography.hazmat.backends.openssl `
            --collect-all cryptography `
            --collect-all oracledb `
            main.py

      - name: Test EXE runs
        run: |
          dist\KnightGuard-PII-Scanner.exe --help
        continue-on-error: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnightGuard-PII-Scanner-Windows
          path: dist\KnightGuard-PII-Scanner.exe
          retention-days: 90

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psycopg2-binary oracledb mysql-connector-python pymongo pdfplumber pytesseract Pillow requests cryptography

      - name: Build Linux binary
        run: |
          python -m PyInstaller \
            --onefile \
            --name KnightGuard-PII-Scanner-Linux \
            --clean \
            --noconfirm \
            --hidden-import psycopg2 \
            --hidden-import oracledb \
            --hidden-import oracledb.thin_impl \
            --hidden-import mysql.connector \
            --hidden-import pymongo \
            --hidden-import pytesseract \
            --hidden-import pdfplumber \
            --hidden-import PIL \
            --hidden-import cryptography \
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 \
            --hidden-import cryptography.hazmat.primitives.kdf.scrypt \
            --hidden-import cryptography.hazmat.primitives.kdf.hkdf \
            --hidden-import cryptography.hazmat.backends.openssl \
            --collect-all cryptography \
            --collect-all oracledb \
            main.py

      - name: Test binary
        run: dist/KnightGuard-PII-Scanner-Linux --help
        continue-on-error: true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnightGuard-PII-Scanner-Linux
          path: dist/KnightGuard-PII-Scanner-Linux
          retention-days: 90

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: KnightGuard-PII-Scanner-Windows
        continue-on-error: true

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: KnightGuard-PII-Scanner-Linux
        continue-on-error: true

      - name: Make Linux binary executable
        run: chmod +x KnightGuard-PII-Scanner-Linux 2>/dev/null || true

      - name: List files
        run: ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.${{ github.run_number }}
          name: "KnightGuard PII Scanner v2.1.${{ github.run_number }}"
          body: |
            ## KnightGuard GRC PII Scanner Agent v2.1
            **ByteKnight Security Pvt. Ltd.** | knightguardgrc.com

            ### Fixed in v2.1
            - ✅ Oracle DPY-3016 cryptography bundled correctly
            - ✅ ORA-12638 thin mode (no Oracle client needed)
            - ✅ Resume — checkpoint every 50 tables
            - ✅ Per-table 45s timeout
            - ✅ Chunked upload
            - ✅ Smart sampling
            - ✅ --verbose flag

            ### Oracle Scan
            ```
            KnightGuard-PII-Scanner.exe configure --server https://api.knightguardgrc.com --api-key YOUR_KEY
            KnightGuard-PII-Scanner.exe scan-db --db "oracle://user:pass@localhost:1521/XE"
            KnightGuard-PII-Scanner.exe scan-db --db "oracle://user:pass@host:1521/ORCL" --threads 50 --verbose
            ```
          files: |
            KnightGuard-PII-Scanner.exe
            KnightGuard-PII-Scanner-Linux
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
